services:
  # ── Backend (NestJS) ──────────────────────────────────────────────────────
  - type: web
    name: smartline-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: smartline-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: MONOBANK_TOKEN
        sync: false
      - key: MONOBANK_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Frontend (Next.js) ───────────────────────────────────────────────────
  - type: web
    name: smartline-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:frontend
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_GA_ID
        sync: false
      - key: NEXT_PUBLIC_META_PIXEL
        sync: false

# ── PostgreSQL Database (free 90 days) ───────────────────────────────────
databases:
  - name: smartline-db
    databaseName: smartline
    user: smartline
    plan: free
